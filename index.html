<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 教育應用精選資源庫｜翻轉教育</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#3b82f6;--sky:#60a5fa;--cyan:#06b6d4;
  --bg:#f4f8ff;--bg2:#eaf2ff;--card:#fff;
  --ink:#0f1c3a;--text:#1e293b;--muted:#5b6b85;--hint:#94a3b8;
  --border:#e3eaf6;--border-l:#eef3fb;--chip-bd:#d6e2f5;
  --grad:linear-gradient(120deg,#2563eb 0%,#2a8be0 55%,#06b6d4 100%);
  --r16:16px;--r12:12px;--r9:9px;--rpill:100px;
  --sh:0 10px 34px rgba(37,99,235,.14);--sh-sm:0 2px 10px rgba(15,28,58,.06);
}
/* ============ TOP（左標題 + 右輪播）============ */
.site-header{position:relative;overflow:hidden;background:linear-gradient(165deg,#ffffff 0%,#eef4ff 55%,#dfeaff 100%);padding:24px 24px 26px}
.sh-grid{position:absolute;inset:0;background-image:radial-gradient(rgba(37,99,235,.13) 1px,transparent 1px);background-size:22px 22px;-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.5),transparent 75%);mask-image:linear-gradient(180deg,rgba(0,0,0,.5),transparent 75%);pointer-events:none}
.sh-blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.45;pointer-events:none}
.sh-b1{width:300px;height:300px;background:rgba(96,165,250,.45);top:-130px;right:-40px}
.sh-b2{width:220px;height:220px;background:rgba(6,182,212,.30);bottom:-120px;left:-40px}
.top-inner{position:relative;z-index:2;max-width:1200px;margin:0 auto;display:grid;gap:22px;align-items:start}
@media(min-width:880px){.top-inner{grid-template-columns:2fr 3fr;gap:32px}}
.intro{text-align:left;padding-top:4px}
.intro-desc{font-size:14px;color:var(--muted);line-height:1.85;max-width:500px;margin-top:14px}
.intro-feats{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.intro-feats span{font-size:12px;font-weight:600;color:var(--blue-d);background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.14);padding:5px 12px;border-radius:var(--rpill)}
.hero-label{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:900;color:var(--ink);margin-bottom:12px}
.hero-label::before{content:'';width:18px;height:3px;border-radius:2px;background:var(--grad)}
.sh-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:2.5px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:14px;padding:5px 14px;border-radius:var(--rpill);background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.16)}
.sh-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--grad)}
.sh-title{font-size:clamp(1.85rem,4.4vw,2.65rem);font-weight:900;color:var(--ink);line-height:1.2;letter-spacing:-.01em;margin-bottom:12px}
.sh-title .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sh-sub{font-size:clamp(.95rem,2vw,1.1rem);font-weight:500;color:var(--muted);line-height:1.7;max-width:440px}
/* ---- Hero 輪播（緊湊卡片）---- */
.hero{min-width:0}
.hero-slide{display:none}
.hero-slide.active{display:flex;flex-direction:row;animation:hfade .4s ease;background:var(--card);border-radius:var(--r16);overflow:hidden;box-shadow:var(--sh)}
@keyframes hfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-img{position:relative;width:44%;flex-shrink:0;overflow:hidden;background:var(--bg2)}
@media(max-width:560px){.hero-slide.active{flex-direction:column}.hero-img{width:100%;aspect-ratio:16/9}}
.hero-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.hero-slide.active:hover .hero-img img{transform:scale(1.03)}
.hero-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--grad)}
.hero-badge{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;background:rgba(255,255,255,.96);color:var(--blue-d);font-size:11px;font-weight:700;padding:5px 12px;border-radius:var(--rpill);z-index:2;box-shadow:var(--sh-sm)}
.hero-badge svg{width:12px;height:12px;flex-shrink:0}
.hero-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:18px 22px}
.hero-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.hero-cat{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--rpill);background:var(--bg2);color:var(--blue-d)}
.hero-ttl{font-size:clamp(1.05rem,1.7vw,1.28rem);font-weight:900;color:var(--ink);line-height:1.42;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:13px}
.hero-author{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;min-width:0}
.hero-author span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero-avatar{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:var(--bg2);color:var(--blue);display:flex;align-items:center;justify-content:center}
.hero-readbtn{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;background:var(--grad);color:#fff;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:var(--r9);text-decoration:none;transition:filter .2s,transform .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(37,99,235,.30)}
.hero-readbtn svg{width:14px;height:14px;flex-shrink:0}
.hero-readbtn:hover{filter:brightness(1.07);transform:translateY(-1px)}
.hero-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 0 0}
.hero-dots{display:flex;gap:6px}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(37,99,235,.22);border:none;cursor:pointer;padding:0;transition:all .22s}
.hero-dot.active{background:var(--blue);width:24px;border-radius:4px}
.hero-arrows{display:flex;gap:7px}
.hero-arrow{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:var(--sh-sm)}
.hero-arrow:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.hero-arrow svg{width:14px;height:14px}
/* ============ CONTROL BAR ============ */
.ctrl-bar{background:#fff;border-bottom:1px solid var(--border)}
.ctrl-inner{max-width:1200px;margin:0 auto;padding:13px 20px;display:flex;flex-direction:column;gap:11px}
.search-wrap{position:relative;width:100%}
.s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--hint);pointer-events:none}
.s-icon svg{width:16px;height:16px}
#searchInput{width:100%;padding:11px 14px 11px 40px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rpill);font-family:inherit;font-size:13.5px;color:var(--text);outline:none;transition:all .2s}
#searchInput::placeholder{color:var(--hint)}
#searchInput:focus{background:#fff;border-color:var(--blue-l);box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.filters{display:flex;flex-direction:column;gap:9px}
.filter-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.filter-row-split{gap:8px 26px}
.filter-sub{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.filter-label{flex-shrink:0;font-size:11px;font-weight:700;color:var(--hint);letter-spacing:1px;padding-top:7px;min-width:30px}
.chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
.chip{padding:6px 14px;border-radius:var(--rpill);border:1.5px solid var(--chip-bd);background:#fff;font-size:12.5px;font-family:inherit;color:var(--muted);cursor:pointer;transition:all .16s;white-space:nowrap}
.chip:hover{border-color:var(--blue-l);color:var(--blue-d);background:var(--bg2)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;box-shadow:0 3px 10px rgba(37,99,235,.28)}
.filter-hint{font-size:11.5px;color:var(--hint);line-height:1.6;margin-top:1px}
/* 主題列（編輯角度，與下方四維屬性篩選刻意不同樣式）*/
.theme-bar{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px dashed var(--border)}
.theme-lead{flex-shrink:0;font-size:11px;font-weight:700;color:var(--hint);letter-spacing:1px;min-width:30px}
.theme-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;flex:1;min-width:0;scrollbar-width:thin}
.theme-chips::-webkit-scrollbar{height:5px}
.theme-chips::-webkit-scrollbar-thumb{background:var(--chip-bd);border-radius:10px}
.theme-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:2px;padding:6px 14px;border-radius:var(--rpill);border:none;background:var(--bg2);color:var(--blue-d);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .16s;white-space:nowrap}
.theme-chip::before{content:'#';opacity:.5;font-weight:700}
.theme-chip:hover{background:#d9e6ff}
.theme-chip.active{background:var(--grad);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.34)}
.theme-chip.active::before{opacity:.75;color:#fff}
/* ============ RESULT BAR ============ */
.result-bar{max-width:1200px;margin:0 auto;padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.result-count{font-size:13px;color:var(--muted)}
.result-count b{color:var(--blue-d);font-weight:700}
.clear-btn{display:none;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 6px;border-radius:6px}
.clear-btn:hover{background:var(--bg2)}
.clear-btn.show{display:inline-flex}
.clear-btn svg{width:13px;height:13px}
/* ============ GRID / CARDS ============ */
.grid-wrap{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(282px,1fr));gap:18px;align-items:start}
.card{background:var(--card);border-radius:var(--r16);border:1px solid var(--border-l);overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform .22s,box-shadow .22s;box-shadow:var(--sh-sm)}
.card:hover{transform:translateY(-5px);box-shadow:var(--sh)}
.card-imgwrap{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;flex-shrink:0}
.card-imgwrap.ratio11{aspect-ratio:1/1}
.card-imgwrap img{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
.card:hover .card-imgwrap img{transform:scale(1.05)}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,#e6f0ff,#d6eefb)}
.card-overlay-tags{position:absolute;top:10px;left:10px;display:flex;gap:5px;flex-wrap:wrap;max-width:80%;z-index:2}
.card-otag{font-size:10.5px;font-weight:700;padding:4px 9px;background:rgba(255,255,255,.95);border-radius:6px;color:var(--blue-d);box-shadow:var(--sh-sm)}
.card-corner{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:5px;z-index:2}
.badge-feat{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--grad);color:#fff;display:flex;align-items:center;gap:3px;box-shadow:0 2px 8px rgba(37,99,235,.35)}
.badge-feat svg{width:11px;height:11px}
.badge-type{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:6px;color:#fff;box-shadow:var(--sh-sm)}
.badge-type.course{background:#7c3aed}
.badge-type.event{background:#0d9488}
.card-body{padding:15px 17px 11px;flex:1;display:flex;flex-direction:column;gap:7px}
.card-ttl{font-size:1.08rem;font-weight:700;color:var(--ink);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-summary{font-size:12.5px;color:var(--muted);line-height:1.72;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{padding:11px 17px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid var(--border-l)}
.card-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.card-author{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-author svg{width:12px;height:12px;flex-shrink:0;color:var(--blue)}
.card-date{font-size:10px;color:var(--hint);padding-left:16px}
.card-readlink{font-size:13px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap}
.card-readlink svg{width:13px;height:13px}
.card:hover .card-readlink{color:var(--blue-d)}
/* ============ PAGINATION ============ */
.pagination{max-width:1200px;margin:0 auto;padding:0 20px 44px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:6px}
.page-btn{min-width:38px;height:38px;padding:0 11px;border:1.5px solid var(--border);background:var(--card);border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .16s}
.page-btn:hover:not(:disabled){background:var(--bg2);border-color:var(--blue-l);color:var(--blue-d)}
.page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);cursor:default}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-dots{width:34px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--hint)}
.empty{grid-column:1/-1;text-align:center;padding:4.5rem 1rem;color:var(--muted)}
.empty-emoji{font-size:40px;margin-bottom:12px;opacity:.6}
.empty p{font-size:14px;line-height:1.7}
.empty button{margin-top:14px;background:var(--blue);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:600;padding:9px 20px;border-radius:var(--r9);cursor:pointer}
/* ============ FOOTER ============ */
footer{background:var(--ink);color:rgba(255,255,255,.55);text-align:center;padding:20px;font-size:12px}
footer strong{color:rgba(255,255,255,.85)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="site-header">
  <div class="sh-grid"></div>
  <div class="sh-blob sh-b1"></div><div class="sh-blob sh-b2"></div>
  <div class="top-inner">
    <div class="intro">
      <span class="sh-eyebrow"><span class="dot"></span>AI Toolkit for Teachers</span>
      <h1 class="sh-title"><span class="grad">AI</span> 教育應用精選資源庫</h1>
      <p class="sh-sub">從備課、評量到班級經營，精選教學現場用得上的 AI 工具與實戰案例。</p>
      <p class="intro-desc">這裡彙整《翻轉教育》站上與 AI 相關的文章、教學資源、課程與活動，依情境、工具、年段、科目分門別類。無論你想找現成的提示詞與範本、參考其他老師的實戰案例，或掌握最新的 AI 教育趨勢，用上方搜尋或下方篩選，就能快速找到適合自己課堂的內容。</p>
    </div>
    <div class="hero" id="hero">
      <div class="hero-label">最新熱門推薦</div>
      <div id="heroSlides"></div>
      <div class="hero-controls">
        <div class="hero-dots" id="heroDots"></div>
        <div class="hero-arrows">
          <button class="hero-arrow" id="heroPrev" aria-label="上一則"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg></button>
          <button class="hero-arrow" id="heroNext" aria-label="下一則"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="ctrl-bar">
  <div class="ctrl-inner">
    <div class="search-wrap">
      <span class="s-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg></span>
      <input type="text" id="searchInput" placeholder="搜尋標題、作者、工具或關鍵字…" autocomplete="off">
    </div>
    <div class="theme-bar">
      <span class="theme-lead">關鍵字</span>
      <div class="theme-chips" id="keywordRow"></div>
    </div>
    <div class="filters">
      <div class="filter-row"><span class="filter-label">情境</span><div class="chips" id="rowCat2"></div></div>
      <div class="filter-row"><span class="filter-label">工具</span><div class="chips" id="rowCat1"></div></div>
      <div class="filter-row"><span class="filter-label">年段</span><div class="chips" id="rowCat3"></div></div>
      <div class="filter-row"><span class="filter-label">科目</span><div class="chips" id="rowCat4"></div></div>
      <p class="filter-hint">可複選，若沒有看到想選的可保留「不限」或直接於上方輸入搜尋。</p>
    </div>
  </div>
</div>

<div class="result-bar">
  <span class="result-count" id="resultCount"></span>
  <button class="clear-btn" id="clearBtn"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>清除篩選</button>
</div>

<div class="grid-wrap"><div id="grid"></div></div>
<div class="pagination" id="pagination"></div>
<footer><strong>翻轉教育</strong>　·　Copyright © 親子天下. All rights reserved.</footer>

<script>
/* ===================================================================
   AI 教育應用精選資源庫 — 第一階段
   架構沿用霸凌版：GAS 串接 / 欄位解析 / localStorage 快取 / Hero 輪播 / DEMO fallback
   =================================================================== */

// ① 部署好 Apps Script 後，把網址貼到這裡（一定要以 https://script.google.com 開頭）
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzGZLbwCp0jLFScO_vzb14sZ5hpcBAAx3E97WOp4zwwUwYiCh98RQWrACJNpdZ2GcNz/exec';

const PER_PAGE=12;
let DATA=[],page=1,searchQ='';
const active={cat1:new Set(),cat2:new Set(),cat3:new Set(),cat4:new Set(),keyword:new Set()};
let heroIdx=0,heroTimer=null;

// 篩選列固定優先顯示的選項（依此順序排前面，其餘自動依資料補上並排序）
const PIN={
  cat1:['Gemini','ChatGPT','NotebookLM','Canva','Notion','Claude','Perplexity','Gamma','綜合應用'],
  cat2:['備課教學','班級經營','評量','親師溝通'],
  cat3:['國小','國中','高中'],
  cat4:['國語','數學','英語','社會','自然','綜合跨科'],
  keyword:['最新趨勢','思辨觀點','台灣現場','AI素養','政策法規','案例分享','國際視野']

type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010720","title":"不讓AI取代學習過程！引導型助教製作四步驟（含指令模板）","author":"方方老師","date":"2026-03-31","summary":"孩子透過 AI 很快就能拿到答案，表面看起來省時又方便，但實際上卻悄悄破壞了探究學習的張力與學生的主體性，更要擔心因 AI「幻覺」傳遞錯誤資訊，讓學生學到偏差知識。方方老師分享如何真正把 AI 用對，讓 AI 不只是解答機，而是能激發學生思考、引導動腦的最佳夥伴。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/Gnl11dOBCfQSwRqR6KBYtyAa1deC71K7ElBbUjhj.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010684","title":"用 AI 為驅動程式，跑動古文檔案：以 115 年北北基三模考題示範「古文新解影片」的轉譯效力","author":"吳品萫","date":"2026-03-20","summary":"面對文言文，學生總是發呆？翻完語譯卻還是一臉茫然？其實卡關的是「文化語境」的斷層，源自於古今文化語境的落差。資深國中教師吳品萫老師利用 AI 轉譯化解系統衝突，以陸九淵〈白鹿洞書院講義〉與王慎中〈與夏松泉〉為例，搭起理解古文的橋梁，「跨時代驅動程式」接軌古今。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/0Z4u61najPyMpIJyDtdtqv3kl5AImtDgLXo4Dnh2.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010673","title":"從趨勢洞察到理念落地：2026 AI 素養教育論壇的策展思維","author":"吳奇","date":"2026-03-09","summary":"AI 融入教學成了日常，問題並沒有因此消失。老師擔心評量公平，家長擔心孩子依賴 AI，學校行政也苦於缺乏制度依據。「2026 AI 素養教育論壇」策展人、數位敘事力期刊的吳奇老師分享 2026 年的 AI 趨勢觀察，如今教育不只要討論怎麼用 AI，更需要思考如何與 AI 共處，建立新的學習與規範。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/ByK9YZmKv099U7pi4Ud8nWuTzhMeybqgFZqbffeT.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010671","title":"企圖心非學霸專屬！OECD 實證：AI 時代人才必備「開放心態」","author":"吳和懋","date":"2026-03-06","summary":"滿級分不再是成功唯一方程式！專家與 OECD 數據證實，在 AI 時代，驅動孩子追求頂尖的關鍵是「開放心態」。別讓升學焦慮抹殺了孩子探索未來的企圖心。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/EjEDm177Gg8FizwS6VaiZcTOUzWFyNNheXobvJOk.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010655","title":"Gemini GEM 教學應用攻略：把「重複備課」變成一鍵啟動的專屬助教","author":"簡子惠","date":"2026-02-24","summary":"生成式 AI 讓備課更有效率，卻常因語氣、格式與教學邏輯不一致，需要再多花時間反覆修改。資深國中自然科教師簡子惠老師詳細解析 Gemini 的Gems功能，教你打造專屬AI助教，穩定產出學習單、教案內容等，提升備課效率與品質一致性。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/AHwmbwKBQNAGCFFxeKDtU1E7S4hUPT1vT8mtOr8V.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010646","title":"學生深信「AI 懂我」？破解 AI 的「同溫層陷阱」","author":"蔡昔熹(CC老師)","date":"2026-02-12","summary":"「老師，AI 說他是故意的！」當學生拿著對話紀錄指控同學，教育現場正面臨全新挑戰。為何AI的溫柔回應，反而強化孩子的偏見與確信？蔡昔熹老師解析背後心理機制，指出AI可能成為同溫層陷阱，並提出3個結合SEL的對話練習，引導孩子辨識AI影響，走出虛擬舒適圈，在真實互動中培養心理韌性。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/pqiHLb12XQHGhnaCsMiHJnEqHtMjnvdd2kZpGMgG.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010645","title":"生成式 AI 讓一切變簡單，也讓 4 種焦慮影響親師生","author":"林建毅","date":"2026-02-11","summary":"學生的資料來源、我們接收的教育資訊，早已被平台形塑，未來作業、報告、學習歷程檔案，教師與家長如何重新理解「這是不是孩子的學會」？林建毅老師專欄將透過圖文為讀者拆解「AI 焦慮」的來源，一起探討：在 AI 深度參與的時代，我們和孩子還能如何與 AI 互動？","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/WKn5oEA5wLAJG9FpLaerlELSkIQgY56H0oMuShOF.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010636","title":"刻意留白、刻意受挫：該如何守護 AI 時代下的資優孩子？","author":"林芸","date":"2026-02-03","summary":"在 AI 與短影音高度滲透的環境，資優學生反而更容易放棄深度思考？本文結合《多巴胺國度》的神經科學觀點，解析現今多巴胺過剩的時代，資訊取得的「容易」與「有趣」如何削弱耐挫力。林芸老師提出在 AI 教學與專題研究中，重新培養主動創造與後設認知的實際做法，提供教師與家長帶領孩子學習的引導策略。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/X0jWVBJjFGU8MYGeXV1lqsdL2g9YTHxKBCKojms4.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010629","title":"AI陪聊，是蜜糖還是毒藥——我的數位修身實驗","author":"周家嵐","date":"2026-02-02","summary":"當AI陪聊成為最即時的傾聽者，它帶來的安慰與風險，值得我們正視。周家嵐老師以親身經驗分享一段真實的 AI 陪聊心得記錄，整理過程中體會到的依靠、迷惑與反思，並嘗試突破一個關鍵問題：在無法拒絕 AI 的時代，我們該如何學會與它保持清醒而有界線的關係。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/lwTq6MH3m4XkBrxI3gSp5JFwuVxujAPXueeJvptS.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010630","title":"AI 新世代學生學習樣貌：誰在用 AI 偷懶？誰真的變強？","author":"吳宜蓉","date":"2026-02-02","summary":"用 AI 學習已成為日常，但學生真的更會學了嗎？有人用 AI 交差了事，有人成績亮眼卻學習力空洞，也有人藉 AI 真正成長。宜蓉老師結合國外研究與常見學習情境，分享四種學生學習類型，回應學生與家長的學習迷思，並提出 AI 時代必備的關鍵能力與習慣，邀請大家一起重新思考：什麼，才是真正的學習。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/aOY2Z8ovqrc6nzHTX8TMewf5yTwAudTxs74MBkif.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010622","title":"從技術幻象到素養落地：AI融教領域下的深學路徑探索","author":"羅宇順","date":"2026-01-28","summary":"AI工具走進課堂，輕鬆與便利的同時是否讓「完成任務」與「真正理解」之間產生落差與不平衡？當技術效率掩蓋了思考歷程，學習的深度是否正在悄悄改變？本文試著回到教學現場，從淺學風險、深度學習價值與課堂生態出發，重新思考如何面對 AI 融入教學，真正地成為學習上的一大助力之一。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/uaLV5kms8agnySq8bmG3AWVLu8sUPykRKYnzcTkU.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010613","title":"用 AI 搭寫作鷹架！助小學生翱翔在童詩世界","author":"陳彥如（如酸菌）","date":"2026-01-27","summary":"低年級孩子天馬行空的想像，如何收攏成動人的詩句？這往往是語文教學最需「接住」孩子的時刻。陳彥如老師嘗試將 AI 化身為溫柔的「寫作鷹架」，帶領七歲孩子拆解經典古詩〈詠鵝〉，讓科技成為降低門檻的階梯，而非替代思考的捷徑。只要給對了工具，每個孩子都是天生的詩人。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/xtZGLAnyk9vZFgySl5bdbWx7quTFGyIL2zmNpB0g.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010595","title":"教育部資科司司長吳穎沺：「在AI時代成為清醒的浮士德」，會使用AI也要會拿回「自主能動性」","author":"親子天下教育創新中心","date":"2026-01-13","summary":"從生成式AI的影響到AI素養、再到AI時代的素養，教育部資科司司長吳穎沺脫掉西裝外套，變身回中央大學網路學習科技研究所吳教授，在「2025中小學AI素養教學研討會」，用簡易又接地氣的例子，為中小學老師與國內產官學者解惑：在 AI 時代，我們該如何教孩子在這場與科技的交易中，守住人類的自主能動性。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/48zYowgjrcFMZ05iRn1681PE4WcwA3pt9t6OS9hJ.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010589","title":"【AI 備課攻略】差異化教材、課堂互動到素養命題，3篇 Gemini、NotebookLM 實戰心法帶你無痛上手","author":"翻轉教育","date":"2026-01-13","summary":"在教學現場，老師都希望想要把課備得更好，但現實是，光是趕進度和處理行政瑣事，往往就已經佔據了大部分的時間，常讓人覺得心有餘而力不足。本文精選三篇第一線教師利用 AI 工具幫助老師備課更高效、更細緻的實戰應用，分享從教材整理、課堂活動到評量出題的具體操作方法。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/nUjKjPuT6lE5Q5H0ua0PM7X8hyBTkDhdXzc3lPlJ.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010575","title":"期末評語寫到手軟？用 Gemini Canvas 打造你的「專屬分身」，告別 AI 的「風花雪月」！（文末附AI工具資源）","author":"方方老師","date":"2026-01-09","summary":"期末評語常讓老師倍感壓力，尤其希望寫出兼具個人風格、又能真正鼓勵學生的文字。方方老師分享如何運用 Google Gemini Canvas，讓 AI 學習自己的筆觸與語氣，產出更貼近個人風格的評語。文中也提供老師親手打造的「期末評語小幫手」，為忙碌的期末工作帶來一臂之力。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/fcYGfd0e2EhXPLBaQPhzMzlm6cnVMqWHrE2TjK7o.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010583","title":"兩年AI融入教學現場實錄與反思：我們正在跨越的三道檻","author":"韋哥科技教室","date":"2026-01-05","summary":"「老師，我直接問 AI 就好了吧？」這句話，近兩年在我的教室裡出現得越來越頻繁。從驚訝、不安到反覆嘗試，我逐漸發現，AI 帶來的衝擊不是工具問題，而是對教學選擇與價值判斷的挑戰。這篇文章整理兩年教學觀察，思索AI下教育正跨越的三道門檻。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/pDsZkKkadRWke1SsQ861SpD2AxIkuN4mwlbEFlNL.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010581","title":"AI一鍵給答案，就不動腦思考了？孩子啟動「大腦節能模式」三大警訊","author":"趙宥寧","date":"2026-01-02","summary":"當生成式 AI 能在幾秒內生成摘要或作文，學生看似獲得更多答案，卻可能正在失去思考與理解能力。國內外教學現場觀察皆指出，快速取得答案不等於真正學會，若缺乏正確引導，學生容易只看見資訊碎片，失去深度思考。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/fyptzisHzhAG33FEBO2AkpkESDi6AJan3Y2spVH8.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010515","title":"從私廚到 AI 教育家！nuva 創辦人林上哲：AI 時代核心能力是品味","author":"施雲心","date":"2025-12-10","summary":"AI 加速處理工作的時間，然後呢？翻轉教育專訪 nuva 創辦人林上哲，以從私廚到 AI 教育工作者的獨特人文視角指出，AI 時代的核心能力不是技能，而是「品味」。本文將分享他如何教 AI 更教 AI 素養，幫助各行各業的學生找回人生主導權。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/Bodm0jRJncNxcfTjaOAigPwxNvM95Px95wPnR6cD.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010526","title":"「我是 AI 創課師！」競賽廣徵 AI 素養教育創新與科技應用，最高獎金五萬元！","author":"親子天下教育創新中心","date":"2025-12-12","summary":"為加速推進臺灣學生的AI素養，並鼓勵教育工作者應用AI技術提升教學效能，親子天下教育創新中心偕同誠致教育基金會、光寶文教基金會、台積電文教基金會等「AI素養教育聯盟」成員，共同主辦「我是AI 創課師！」競賽，最高新臺幣五萬元的獎金。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/LnGMuF6YRoArhR2KS6Rb4NWdYyfpZZr4H6AK2hvv.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010528","title":"AI融入課程，我們該教什麼？用W.I.S.E.模組帶孩子走讀家鄉記憶","author":"方方老師","date":"2025-12-18","summary":"當AI走進教室，我們該教孩子什麼？方方老師分享運用W.I.S.E.模組設計課程，引導學生透過AI探索、感受與設計屬於自己的家鄉故事，實踐高層次的學習與文化轉譯，並結合在地實作與科技應用的創新教學法。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/rphzlJqGoKAsVFj2uUtPCRFKwGL0YLYVu1twbmJI.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010531","title":"AI時代人手一面魔鏡…品學堂國際論壇揭「大腦外包」危機","author":"趙宥寧","date":"2025-12-19","summary":"生成式 AI 進入教室，學習樣貌正快速翻轉。品學堂舉辦《2025閱讀未來國際教育論壇》，聚焦 AI 在教學現場的應用與界線。品學堂創辦人黃國珍強調，教師與家長應成為引導孩子思考、陪伴學習的重要他人。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/4KRrB4bJ8PwDWXxaMBT6SIqQ7AxgGUX45Bz9dS7r.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010529","title":"NotebookLM：老師最強備課神器與教學助理！最新功能亮點、入門教學與實戰應用解析","author":"翻轉教育","date":"2025-12-24","summary":"想要有專屬又好用的AI備課工具？Google NotebookLM 主打「根據你的資料回應」核心功能，搭配持續更新的工作室功能，可一鍵生成心智圖 、簡報、資訊圖表、podcast或影片，推出以來受到許多教師的青睞。本文整理核心亮點、快速上手教學，並收錄現場老師實戰應用分享，讓備課效率與品質都翻倍。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/HoZI3wCpA8EqRP60zhbuhj37VaGsznGwiJ2nZnqB.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010542","title":"不操作 AI 學 AI！一張紙打造設計思考×手繪原型的省思教學","author":"趙文川","date":"2025-12-25","summary":"學生是影響AI，還是被AI影響？趙文川老師透過一堂有趣的設計思考的課程，不急著開電腦，而是引導學生思考、手繪App/網頁的原型發想，並在草圖註解元件與系統，親身體會資料如何被蒐集、演算法如何運作，進而培養「看懂科技如何影響我」的能力，把 AI 素養從抽象名詞，轉化為看得見的負責任設計思考。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/65VpUND0rknnsfUG8U7rbb4OrC9NeYU7A9z7c1Z3.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010545","title":"從語文新解到視覺化解題！AI 助語言學習理解的應用教學","author":"吳品萫","date":"2025-12-24","summary":"語文教學怎麼做，才能讓學生真正懂，而不是只記住詞義？在素養題成為評量日常的現在，老師往往得花大量時間，將抽象詞義轉成例句、情境。本文吳品萫分享如何透過 AI 工具，把成語、單字與閱讀題目轉譯為貼近生活的語言與視覺，協助學生理解脈絡、抓住重點。帶你重新調整備課重心，把時間留給真正重要的理解與思考。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/nXYWNjB1B9UKHjn0d8CJOaD1JIOucF8nr6vEYv9s.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010561","title":"〈畫說湖心亭看雪〉遇上 AI：多重觀點與視覺化閱讀的教學設計","author":"吳品萫","date":"2025-12-26","summary":"AI 進入國文課堂，不只是把課文變成圖表。以〈湖心亭看雪〉為例，吳品萫老師分享如何結合 Gemini、NotebookLM 等工具，引導學生從結構、情緒、視角到價值立場進行多重閱讀，透過視覺化轉譯，深化文言文理解與詮釋能力。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/CvfD6sEmrNdCY6UBfBriLZatrF10OmjuSWaK5N3I.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010564","title":"AI協作下的設計思考：運用提示詞迭代貪食蛇遊戲","author":"林建毅","date":"2025-12-29","summary":"當 AI 已經能又快又好地完成任務，孩子還需要學什麼？本文台中東園國小林建毅老師不談如何更快使用 AI，而是如何一起慢下來，重新思考學習的本質！運用設計思考的「體驗、統整、反思、應用」歷程，讓孩子從應用 ChatGPT 和 CodePen 完成貪食蛇遊戲，帶走的不只是作品，更是如何思考的能力。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/QvsR9a6cFr5DWri03EIV83fjsUIFJQo3Jei0GuBs.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010568","title":"運用AI化被動為主動的媒體識讀課：數位足跡與過濾氣泡的覺察","author":"曾靜瑜","date":"2025-12-30","summary":"依據2025年財團法人台灣網路資訊中心（TWNIC）的報告顯示，台灣在網路普及率方面高達87.1%，我們無法抵擋孩子發展屬於他的數位生活。然而，網路的使用是雙面刃，最令我們擔心的莫過於當網路世界的黑暗角落出現時，我們未必能在孩子身邊，他們能否有足夠的判斷力面對？","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/lAa3dKmGSOApDnbKEJ6eM4sCPghuVLLoWVFd0TXy.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010505","title":"AI 協作命題不是外包：從會考趨勢看教師出題專業（附 AI 出題工具）","author":"簡子惠","date":"2025-12-04","summary":"面對會考素養走向，各版本教科書也推出 AI 命題工具，看似方便，卻更需要教師抓住命題核心。本篇整理近年自然科考題趨勢，並示範 AI 命題工作流與分享自製的 AI 出題工具，協助老師在提升效率的同時，依然精準掌握能力導向，避免把命題變成外包，讓評量回到專業與教學現場。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/EGYAYJ1J5AvWFbOJRZBPIxHwZTtRRQSsnbqxlyRM.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010485","title":"用四本少年小說談「長大」1：設計提問篇","author":"張琳","date":"2025-11-26","summary":"緊扣文本又貼近學生「好」問題怎麼設計？張琳老師以四本少年小說為核心，設計圍繞「長大」主題的提問，並運用 AI (ChatGPT協助擬題)，引導學生從閱讀中思考、書寫，並增加作答要求、表達自我觀點，展現語文教學的深度與溫度。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/7sCOF ":false},{"url":"https://flipedu.parenting.com.tw/article/010324","title":"當 AI 遇上國文課：用 NotebookLM 打造說課、自主學習與補救教學神器","author":"吳品萫","date":"2025-09-09","summary":"學生程度落差大、課程時間壓縮、教材難以統整怎麼辦？本文介紹 NotebookLM 如何協助國文教師一鍵生成說課報告、心智圖、語音摘要與影片整理，從備課到教學現場、從預習到補救，全面支援差異化與自主學習。當 AI 成為教學夥伴，國文課也能從靜態紙本，躍升為多元互動的學習場域。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/pCtzEe2RcNUYj9OyX4uhcP81TDkoUJOlDJ1z18He.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010313","title":"校長老師都能用的網站助理：打造專業個人網站","author":"蔡明貴","date":"2025-09-02","summary":"在學校裡，校長往往會遇到：任期一換，個人介紹的網站就得重建，而資訊組長又忙不過來。為減輕現場負擔，阿貴校長分享「GPT 網頁設計助理」，讓校長、老師、行政人員只需輸入需求，就能快速生成專業網站。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/mvGWeWtMhFhgo6oYdbnF0h4ratDbRgFXTb6Ze2Q2.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009240","title":"Poe AI 平台介紹：善用 Poe，免費使用 AI 機器人","author":"方方老師","date":"2024-05-21","summary":"在使用AI時，如何對 AI 下指令（咒語）並不是一件簡單的事情，也造成了老師們在使用時產生的結果總是「差強人意」。方方老師因此為文介紹 Poe 平台，以 AI 教案機器人為例圖片步驟分享如何更快速的使用不同功能的 AI Chat 機器人。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/JWgTrxCut4FMSEXLF5Rhef8B4PkHLacAc5FQI2ga.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/008514","title":"AI 融入所有課程，全美第一所 AI 高中怎麼教？","author":"黃敦晴","date":"2023-08-07","summary":"當教育界還在摸索怎麼面對、甚至管制 AI 時，美國的第一所 AI 高中已經辦學邁入第二年，而且將來整個學區，從幼兒園大班到高中，都要在每一科融入 AI。這所 AI 高中有什麼不同？他們如何將 AI 融入教學？","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/eR738n4RAOuK33f0DU5tZvWIciZQezfFtRn9XLyn.jpg","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/008647","title":"擔心學生用 AI 寫作業？六招教老師揪出作業中的 AI 痕跡","author":"黃敦晴","dat 享實際教學實踐的成功案例，為教師們提供靈活運用 AI 工具的具體建議，激發學習動機與創意思維。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/N99UxkHldnMdlLVYJqkNM3uns98Tff5QRe7qPQY4.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/006154","title":"如何將AI融入現有課程？","author":"蜜雪兒‧齊默曼","date":"2020-09-22","summary":"「到底該如何將AI融入現有課程之中？」這個問題往往令教師有些不知所措。克魯格的建議是：「就像教授其他科目時一樣，成功將AI融入教學的關鍵，是先從『設定學習目標』開始，然後再問：『如何讓AI幫助學生達成目標？』」","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/gJXEZIbSzZTwf6S09hMMQNMxytfwe8RimPEBBnZd.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/008919","title":"生成式 AI 好多霧煞煞！教學場域應用怎麼挑？老師帶你了解入坑前該知道的事情","author":"吳奇","date":"2024-01-05","summary":"你身邊有老師對 AI 抱持懷疑的態度嗎？或自己對 AI 涉入未深，見愈來愈多老師運用 AI 而感到焦慮？讓經營數位敘事力期刊 IG 的吳奇老師帶你認識、理解並應用 AI，從使用生成式 AI的提醒、運用文字式生成式 AI 怎麼選擇到 4 大平台評比，並分享 2024 年教育 AI 應用5大趨勢。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/gJXEZIbSzZTwf6S09hMMQNMxytfwe8RimPEBBnZd.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/007961","title":"ChatGPT如何應用在教學中？和AI攜手打造新型態學習","author":"葉士昇","date":"2023-01-05","summary":"近日由 OpenAI 打造的自然語言對話模型 ChatGPT 在全世界爆紅，撰寫文案、編寫教案、問答解惑⋯⋯各種應用讓人們躍躍欲試，也模糊了未來人類與人工智能的工作界線。或許，未來的世界不再是想著如何打敗AI，而是得學習如何善用AI工作，至於應用在教學上可以怎麼做，看看葉士昇老師的作法。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/gJXEZIbSzZTwf6S09hMMQNMxytfwe8RimPEBBnZd.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010036","title":"數位學習新思維：把 AI 學習單化，讓思維聚斂成型","author":"方方老師","date":"2025-05-06","summary":"AI 融入教學是當前的教育趨勢，然而老師們卻可能面臨「如何對 AI 下指令」的難題。方方老師分享，透過設計流程框架與操作介面，將 AI 從單純的「對話框」轉變為「App」，能降低老師們使用AI的門檻，更高效地完成任務。","image":"https://flipedu-cdn.parenting. 工具，讓 AI 不僅降低了學習門檻，更激發了孩子對程式設計的熱情。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/gJXEZIbSzZTwf6S09hMMQNMxytfwe8RimPEBBnZd.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009142","title":"方方老師的AI課程：當 AI 遇到教學，2種不同的課程規劃","author":"方方老師","date":"2024-04-09","summary":"近年生成式 AI 發展快速，也成為許多老師選擇教學工具的選項之一。方方老師分享以AI為教學主題的課程—— AI 說書人，以及AI作為輔助融入教學的PBL課程規劃，並運用日前剛上線的新 AI APP「Arc Search」，引導學生可以利用心智圖整理、分析與討論。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/QSS6JeHBk1ZO9F7hjgtiJD0MmTdgTkOVSqI4QGvz.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010457","title":"AI × SEL：利己社會氛圍讓孩子們學會同理思考","author":"吳奇","date":"2025-11-12","summary":"在文言文課堂中可以怎麼教同理、結合SEL？吳奇老師透過 AI 與 SEL 結合的課程設計，讓學生從古人的視角反思自身情緒與行為，並發展出具體、可實踐的行動策略。課程讓學生不僅理解文學，更練習情緒管理與社會溝通能力。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/LZ2BXoqKSCxrsdBdH96nfbJgN8Ynb5YfazdPSpjR.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010390","title":"美學者揭AI時代必學三大非認知能力 教學範例大公開（國小到高中適用）","author":"游昊耘","date":"2025-10-13","summary":"當 AI 外包我們的認知能力，教育該培養學生什麼能力？學生用 AI 寫作業，對學習真的有幫助嗎？本文綜整美國教育專家學者提出 AI 時代必學三大非認知能力、教師如何實踐於課堂，以及如何評估學生與 AI 協作有助學習的方法。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/7B4RRKXT7nPCTuNrWBux81e5ugdFBywgcTPM8V2A.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010271","title":"給國中新生的信（下）：善用 AI 科技也照顧情緒的你，更值得信任","author":"晶瑩","date":"2025-08-14","summary":"在 AI 與社群媒體滲透日常的時代，每天都在「滑手機」，卻不一定知道自己「被什麼滑走」。這是一位國中教師寫給新生的信，聚焦於新時代的思考與情緒素養：如何用 AI 而不依賴 AI？如何說出情緒而不讓自己漂流在網路海？陪學生一起成為「有工具也有原則、有情緒也有出口」的數位公民。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/xz6B4ogFpNQn4pjJWMuqF4YuKdWHLYauqvW9A2J1.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009794","title":"AI 融入國文教學：聲音文本的音效生成與跨域思考","author":"吳品萫","date":"2025-01-07","summary":"還在用文字說明教國文嗎？課本中形容的好多聲音有沒有辦法呈現給學生聽呢？品萫老師分享用 AI 將聲音文本變得活靈活現！並從中跨域學習，讓學生更了解聲音文本的魅力所在。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/9HhrOncHMXUByLUmt200Ik7EFhVfVW47VaqmGFHi.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009753","title":"F.A.C.E 教學法：結合 AI 工具的故事創作指南","author":"方方老師","date":"2024-12-17","summary":"教學現場除了常規課程，還需兼顧校本計畫或特色課程、策劃一系列主題教學活動。方方老師結合數位 AI 工具與故事創作的過程，歸納出 F.A.C.E 教學法，實作中學生不僅能夠學會講故事，更能透過科技工具將故事具象化，並透過教學過程培養問題解決與創造性思考的能力。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/CcHo8Bpvr6roRIULMejVSAAHfGSMyz1hUe1lpqep.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009480","title":"自評日記小助手AI來幫忙！培養孩子反思的能力","author":"方方老師","date":"2024-08-21","summary":"你也有讓學生寫小日記嗎？除了甲乙本、生字語詞練習與練習卷等精熟練習的作業，如何設計「有意義的作業」已成為老師下一步重要的方向。方方老師分享，圖畫日記是很適合小學生的一項作業，但要真正促進孩子反思與學習也需要有效的寫作引導。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/ZLannnG702JKxTsi56FAVXwMVOMvOn8uf5PXnUc0.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009424","title":"批改作文不再費神費力！透過AI評分、給予評語","author":"方方老師","date":"2024-07-29","summary":"想用 AI 改作文能怎麼做？改作文不僅考驗老師細心、專業、公平，任教人數較多的班級時，帶回家慢慢給評語更是家常便飯。方方老師分享自製的國小、國中、高中 AI 改作文機器人，大幅減輕老師們的工作量，也能成為孩子的自學好夥伴。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/lVI43uq7OJOpM2d9rVwgldy5mHQuxaiBwCCPK8Br.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009340","title":"身處AI浪潮中的我們到底該學什麼？以文科教師也能寫程式的Claude 3.5 Artifact為例","author":"吳奇","date":"2024-07-01","summary":"近期 Claude 3.5 Sonnet 讓沒有系統性學習過程式語言的人也在短時間完成網頁程式工具、遊戲動畫，挑戰 GPT-4o 最強AI的地位，在這樣的AI不斷造成衝擊的浪潮中我們到底該學什麼？是「讀AI領域才能賺錢」還是「AI 就能寫程式，讀資工無用」？中學教師吳奇老師提出不一樣的看法。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/bJ5dR1LdsLHKDafMNOgDeoGqDBR8RFDAY7W7MCu7.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009255","title":"讓 AI 改學生作文、作業更省事？要注意什麼？","author":"程遠茜","date":"2024-05-28","summary":"2022年 ChatGPT 問世以來，AI 展現驚人的文案力，不過如果現在躍躍欲試讓 AI 機器人改作文、或是開放式申論題，不只精準、公平都待討論，隱私安全、著作創意也該保護。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/S9PbfvAvjKh7kQhcGGRBdPhRj6WO22AyCVsOIa71.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/008750","title":"ChatGPT 問世近一年，美國老師愛用哪些 AI 教學神隊友？","author":"黃敦晴","date":"2023-10-30","summary":"ChatGPT 問世後，AI 與教育的距離從紙上談兵變成教師的日常與真實挑戰。但有老師更進一步把 AI 融入工作，善用 AI 讓教學與行政、溝通都事半功倍，也留下更多時間給學生與自己。哪些工具是他們的神隊友？","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/K1oB9e3NT430KCqm9hMjmj6730xczblXQdbuk77c.jpg","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/008265","title":"資訊老師分享：將ChatGPT整合在課堂的6種教學策略","author":"林穎俊","date":"2023-05-02","summary":"使用ChatGPT真的可以提升孩子學習成效嗎？目前在欠缺足夠證據支持前，沒人有辦法回答。但肯定的是，AI一定會重塑教學的媒介，甚至轉化老師的角色。尚未開始接觸的老師不妨參考本文，林穎俊老師親自示範6種課堂融入ChatGPT的教學策略。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/GLl0rvD8V2wgofd2djZMhXrVrdTIcJLkV7ZbJY1T.jpg","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/006431","title":"善用AI科技訓練 從小教你寫出6級分好作文","author":"林政宏","date":"2021-03-10","summary":"AI時代來了，未來不但能借助電腦改作文，還能教孩子寫出會考6級分好作文。專研「快刀中文論文比對系統」的大數據專家林政宏發現，經過1,200篇文章評分測試，AI 評分與人類完全吻合，因此他介紹2個「跟 AI 學作文的好方法」，家長和老師經常陪孩子練習，有助提高讀寫能力。","image":"https://flipedu-cdn.parenting.com.tw/image/article/2021-03-10/0112f791d3e716bb2e4501cd334faee5-294883.jpg","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009845","title":"小學生適合接觸 AI 嗎？使用時機與教學架構分享","author":"方方老師","date":"2025-02-06","summary":"孩子這麼小，接觸 AI 真的可以嗎？AI 的便利性確實可能讓學生過度依賴，甚至影響學習態度，但禁止使用就是解方嗎？我們更要思考，AI 的學習應該從何時開始又該教些什麼，才能引導孩子在數位時代下如何善用 AI。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/o3QdTRPUXVLFeGW1lObvurGngXLyPthHNjBQyhpI.jpg","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009463","title":"以科技走「鹿」社會脈絡，感受家鄉風情——跨領域專題導向結合體驗教育課程分享","author":"方方老師","date":"2024-08-14","summary":"跨領域課程能如何設計？國小教師方方老師設計一門專題探究課程，結合國語科十二冊的〈臺灣印象〉與社會科第三學習階段的〈人與環境〉，帶領學生們探究真實的情境——在鹿港老街中的行程規劃、實際踏查，並在課程中引導學生運用 AI 與 Canva 等科技輔助學習。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/eyn4gLrnv7bgmiYVEGRM7Pnws4DQTot40kNuezLD.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009348","title":"帶著孩子玩Podcast，運用AI與孩子一起撰寫廣播劇本！","author":"方方老師","date":"2024-07-03","summary":"PBL課程或跨領域主題課程，學習與成果展示的形式也不再限於考試、報告，錄製 Podcast 也可以是其中一種學習方式。方方老師分享帶孩子完成 Podcast 的課程要點，並分享設計的「廣播劇故事腳本撰寫 AI 機器人」協助師生將文本轉變成腳本。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/6lCjD8mcAS4Z1yRSCqwN6iTQkp6TjCbALuuRWVEt.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/010133","title":"AI 輔助 SEL 教學的創新實踐：3 款教學輔助工具讓情緒不再抽象","author":"方方老師","date":"2025-06-13","summary":"AI 工具如何輔助 SEL 教學？當情緒成為學習的阻礙，該如何引導孩子跨越難關、重新走進課堂？方方老師介紹三款實用的 AI 工具，從課文生成提問、情緒故事劇場，到情緒插圖生成與專業引導建議，幫助老師讓抽象的情緒變得具象可談，讓 AI 成為老師推動情緒教育、帶學生進行情緒對話的有力夥伴。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/k1Wv1sjqTo9BKNqcWEVvSKO221SUkwCbqDpoQS1v.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009129","title":"方方老師的AI課程：ChatGPT開放免註冊，成為孩子的個人教師","author":"方方老師","date":"2024-04-02","summary":"Open AI 宣布4月起ChatGPT全面開放！免註冊人人都能用，對於老師們來說，讓學生使用 AI 的門檻也再次降低。方方老師也分享他對於 AI 使用的三大方向，不妨讓孩子試一試，學習如何有意義的使用這些工具。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/sr2XbJiaaokLFGHMcuJYSnahqQZOJpPAe3WRO2tG.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/article/009001","title":"3 個好玩的課堂活動，讓學生成為 AI 生圖大師","author":"李承翰","date":"2024-02-17","summary":"在如今的時代，與 AI 協作的能力愈來愈重要，課程應該如何安排才能將與 AI 不斷對話的能力帶給學生們？有豐富研習講師經驗的查特普拉斯共同創辦人李承翰專欄介紹 3 個難度適中又非常好玩的課堂活動，並分享老師使用 Bing image creator 註冊到教學過程中可能碰到的問題。","image":"https://flipedu-cdn.parenting.com.tw/articles/cover/ieRdxZpnOqZ1JQOvugDuNiJuYQ6sAlNvAUrInYif.png","tags":[],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":false},{"url":"https://flipedu.parenting.com.tw/teacher_resource/598","title":"SEL教案發想 AI 協作思考模板與 50+ 範本","author":"翻轉教育","date":"2026-03-10","summary":"內容說明 知道 SEL 社會情緒學習很重要，卻不知道如何具體落實？想結合 AI 協助備課，卻不確定怎麼描述自己的需求給 AI。 本資源以「結構化指令設計」為核心，幫助教師用清楚的選擇需求模組，快速生成符合自身班級需求的 SEL 教案。產出真正協助教師在真實教室情境中的教學活動，穩定、長期地培養學生的社會情緒能力。 本設計原則包含： 以 SEL 五大能力為核心架構 以班級經營為主要落點，學科融入為延伸 強調安全、非強迫分享原則 支援差異化","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/598/cover/uJRAdZ7wmsdJhAnP7uUCYXKObWTgiMUIdIUPimdN.png","tags":["教學資源","SEL情緒"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/465","title":"英文科AI人機協作流簡報：教案＋聽說讀寫全攻略","author":"李承翰","date":"2024-12-09","summary":"內容說明 結束成功高中的 4 天 AI 全科研習，覺得能跟國英數自社藝資輔的老師們交流，實在是我的幸運。 這種優秀老師們互相交流的氣氛讓我深受啟發，於是我決定免費公開這份 57 頁的英文科人機協作流簡報，讓所有老師可以跟著簡報輕易上手 AI！ 使用方法｜ 簡報有以下幾個特點： 簡報分成教案、聽說讀寫 5part，逐步講解 收集了我從小學到大學，與將近 10,000 名左右的老師交流的案例 統整了 10 招人機協作思考原則，並且列上了目前","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/465/cover/4mVRzwqDqNIS1zIPcOqTkwGti6slNWFrTcVvupyR.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/590","title":"Gemini × 教師多元評量工具：課堂檢核、題目生成、學生自評互評","author":"翻轉教育","date":"2026-01-16","summary":"內容說明 設計理念｜ 日常教學流程中，評量不應是額外的負擔，而是教學自然延伸的一部分。此教學資源以「低門檻、低負擔、可即用」的原則，旨在讓老師無需改變既有的教學習慣，即可透過科技的力量優化評量品質。相比於傳統的總結性評量，本資源以「促進學習的評量」（Assessment for Learning）與「評量即學習」（Assessment as Learning）為概念，運用 Gemini Canvas 開發出三套 AI 評量輔助工具，將評","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/590/cover/nAkLN9WlN8z2gdN5BEqOEzaD5kckNPt2uXRQlm1V.jpg","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/588","title":"Gemini 學生輔導紀錄小幫手！表單蒐集 × 自動建檔 × 個別訪談大綱","author":"Google for Education","date":"2026-01-09","summary":"內容說明 設計理念｜ 過去曾製作「學生學期個人輔導記錄」 Google 表單範本，不僅能加速學期輔導紀錄的行政作業，也讓我重新再認識每位學生及他的家庭。 每個導師在實務現場長期面對的行政痛點：資料每學期重填、表單收齊後仍需人工整理，以及在有限時間內為每位學生留下有意義紀錄的壓力。 現在有了 Gemini 更加方便，我將 Google 表單與 Gemini 結合，開發可複製、可擴充的「學生輔導紀錄小幫手」網頁工具，協助更多老師進行輔導紀錄","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/588/cover/LnOZy4Dcfusw78HWvyn14RpPczJDARtSDLf8zb8k.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/587","title":"Gemini「迷思概念測驗」 開發教學與應用","author":"Google for Education","date":"2026-01-09","summary":"內容說明 設計理念｜ 本資源的設計核心，來自教學現場常見的困境，老師看得到學生的作答結果，卻難以看清學生背後真正的「迷思概念」。因此，不以單純測驗對錯為目標，而是透過精心設計的選項，將學生的錯誤轉化為可被辨識、統計與分析的概念類型。 結合 Gemini 與 Canvas 的能力，老師能將課文內容快速轉化為互動式診斷工具，讓學生在作答過程中即時獲得回饋與說明，同時為老師保留可回溯的學習數據。同時強調「降低技術門檻、放大教學專業」，讓 AI","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/587/cover/Hl4G2VIOSTFT0lanNFPWVsfCUE3ZFXMcYZf1oCoG.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/586","title":"Google Workspace 學習模擬器 Gemini Canvas 賦能教學","author":"Google for Education","date":"2026-01-09","summary":"內容說明 設計理念｜ 在數位技能教學現場，老師們常面臨一個痛點：「示範時學生都懂，自己操作時卻找不到按鈕」。真實的軟體介面充滿干擾，學生容易分心。 透過 Gemini Canvas，我們可以為學生量身打造一個「乾淨」、「專注」且「即時反饋」的練習環境。本資源將以「Google 文件模擬器」為例，剖析如何利用 AI 協助我們設計互動式學習鷹架。 使用說明｜ 本資源工具透過模擬 Google 文件、表單、試算表、簡報與協作平台等介面，將複雜","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/586/cover/PmyQEQti61uCuj2nLGU95zoLZPLhGoNTSghA9ZMd.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/585","title":"Gemini AI 口說英語家教！讓學生願意開口說英文","author":"Google for Education","date":"2026-01-02","summary":"內容說明 設計理念｜ 《Gemini 口說練習家教》的發想來自我在教授一門零學分的英文增廣課程時所遇到的困難。 課程內容以閱讀為主，但我希望學生能同步練習聽力與口語。然而班級人數多達 35 人，每週僅有 50 分鐘授課時間，加上沒有成績壓力，學生往往缺乏主動開口的動力。 為了讓「閱讀 → 口說練習」形成連動，我開始思考能否讓 AI 成為學生的課後口語家教，讓他們在完成我設計的閱讀學習單後，下一週能利用同一份內容進行口語演練。 使用說明｜","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/585/cover/JPVgCRTx9L0LhnEcaYyTRFjOCr5Hm2L8AdcEV11S.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/582","title":"Gemini AI 期末評語小幫手！高效生成專屬又有溫度的評語","author":"Google for Education","date":"2025-12-15","summary":"內容說明 設計理念｜ 在學期末，老師常需要面對大量評語書寫，不但要回顧學生整學期的學習脈絡，還得避免重複句型與過度直白的描述，這往往造成沉重的情緒與文字負擔。許多老師明明看見孩子的努力，卻苦於「詞窮」、「不知如何婉轉表達」或「寫到後面越來越沒力」。 因此藉由 Gemini 設計「期末評語小幫手」，希望成為老師的文筆助教：協助潤飾語句、提取亮點，讓原本雜亂的觀察紀錄轉化為專業、溫暖又具個別化的評語。 使用說明｜ Gemini 「期末評語小","image":"https://flipedu-cdn.parenting.com.tw/teachingMa ":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/567","title":"【2025教育創新國際年會】演講ppt整理包：憶起初衷，教學翻轉再出發（AI×非認知×班級經營）","author":"親子天下 2025 教育年會講師群","date":"2025-10-08","summary":"內容說明 9 位講者輪番上陣，在6分鐘內傳授6小時都說不完的畢生功力 #憶起初衷 金句連發 × 多元議題 × 交流互動 × 價值傳遞 用強者 6 分鐘，讓教學翻轉再出發，讓更好的教育來得更快！ *僅部分講者提供簡報下載，更多9位講者＋2場Live Podcast的精彩片段，歡迎前往下方網址觀看。 論壇回放影片：憶起初衷，教學翻轉再出發","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/567/cover/jLXbwcRezG5GuQWK8x1vm9Tehv7a1L0fqfPA987N.png","tags":["教學資源","班級經營"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/563","title":"用 ChatGPT + Arduino 當小小發明家","author":"吳若宜","date":"2025-09-30","summary":"內容說明 此教案為 明德智助進步站 新北市立明德高中附設國中部吳若宜老師設計，獲得 2025 教育創新 100領袖及誠致程有威先生教育科技佳作 。 在日常生活中，雖然科技普及，但仍有許多問題未被有效解決。學生將以「小小發明家」的角色，訪問家中同住者，發掘生活中的困擾，並運用課堂所學的創意思考方法與 Arduino 編程技術，設計出創新產品。藉由創意與科技的結合，學生不僅能改善家居環境，也能體會科技如何帶來生活改變。 使用說明 學生需針對","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/563/cover/i83nDpOEFkHFhuvBkLKriFjCNpHZAWJ4slxumqLo.png","tags":["教學資源","STEAM"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/562","title":"SDGs×AI課程設計：月光寶盒中的橙蜜香","author":"笠山農場領航隊","date":"2025-09-30","summary":"內容說明 此教案由 笠山農場領航隊 美濃國小洪慶源、林聖傑、童暐茹、戴芯瑀老師設計，獲得 2025 教育創新 100 領袖及誠致程有威先生教育科技佳作。 本課程以美濃番茄種植為核心，透過實地體驗、科技應用與創意思考，引導學生認識永續農業與食品保存技術。課程從繪本出發， 讓學生感受番茄價值，探討盛產問題與選果技術，並透過 AI 選果體驗科技在農業中的應用。結合傳統醃製技術，親手製作冰釀番茄，思考保存方式與永續挑戰。最後，以創意影片與歌曲改","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/562/cover/mifT805oyXhDLjzmrznRNSTmDaR6Uf3T32L4HHmP.png","tags":["教學資源","閱讀理解"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/561","title":"樂寫網：AI作文指導聯合教育生態","author":"樂寫公益學習網","date":"2025-09-26","summary":"內容說明 此教案為 樂寫公益學習網 聯發科技吳孟 與社會中的掙扎，培養同理心與對女性尊重的價值觀。 使用說明","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/558/cover/AZdGJqhAOM6dVwejyGuj16AY4gH1AR5dOoMvdOJp.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/556","title":"EQ × AQ × IQ 的國中 AI 融入課程","author":"崇林AI小隊","date":"2025-09-09","summary":"內容說明 此教案為新北市立崇林國中崇林 AI 小隊多位老師設計，獲得 2025 教育創新 100領袖及誠致程有威先生教育科技佳作 。 此教案共有三個系列的課程： Living and Getting Along With Emotions 與情緒共存 (EQ) 植物調查局－校園生態紀錄 (AQ) 三人行，AI 為我師－自然探究專題研究：從問題發現到小論文撰寫 (IQ) EQ×AI 課程設計理念 教案名稱｜Living and Getti","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/556/cover/xmzhWdHF6xK0ZeUH7Mvx6XDXkZOkHA3X9qIDEvC1.png","tags":["教學資源","閱讀理解"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/555","title":"防災教育 × AI：防災數位AI系統輔助學習","author":"AI 同心圓愛教育聯盟","date":"2025-09-05","summary":"內容說明 此教案為 AI 同心圓愛教育聯盟程瑋翔老師設計，獲得 2025 教育創新 100領袖及誠致程有威先生教育科技銅獎 。以「防災教育 × 數位AI工具 × 合作學習」為核心，涵蓋颱洪、坡地、地震、火災、人為與氣候變遷六大議題。透過 GPTs、Google Apps Script 與 Padlet 等數位工具，學生能在互動中建構知識、培養創新思維。 課程設計從個人學習、小組合作到組間互評，強化合作與反思能力；同時結合學習單與活動比較","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/555/cover/3CBefcVAKTkKgQJj7ge4tpL104pTNX5G5n8GY7hA.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/615","title":"【AI思辨】議題桌遊活動設計｜角色扮演 × 共識討論，帶全班從不同角度看AI","author":"玩轉學校 x LG","date":"2026-05-04","summary":"內容說明 設計理念 在 AI 無所不在的時代，孩子需要的關鍵是判斷力。 《樂金筆記本》由 LG 與 玩轉學校 共同合作開發，是一套以「議題式遊戲教學法」為核心的 AI 思辨課程，透過體驗、認知、行動三個層次，引導學生從情境中思考、從選擇中成長。課程讓孩子在兩難之間做出決定，親眼看見決定帶來的結果，答案由他們自己找。 系列課程第一部分「玩吧！遊戲體驗」以魔法國度為舞台，將 AI 議題化為一場多角色的共識會議。每位學生帶著自己的立場入場，成","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/615/cover/ey6nKID1YacJrgh6WRprTBbLUNg1TD84z3Tnk0rP.png","tags":["教學資源","遊戲式教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/616","title":"【AI思辨】附提問腳本｜帶學生從遊戲情境看見AI對真實生活的影響","author":"玩轉學校 x LG","date":"2026-05-04","summary":"內容說明 設計理念 在 AI 逐漸改變世界的過程中，孩子需要的不只是使用能力，而是判斷與思考的能力。 《樂金筆記本》由 LG 與 玩轉學校 共同合作開發，是一套以「議題式遊戲教學法」為核心的 AI 思辨課程，透過「體驗、認知、行動」三個層次，引導學生從情境走向現實，學會面對科技帶來的選擇。 系列課程第二部分「想吧！故事背後」，承接遊戲經驗，帶領學生重新檢視自己的決定與立場。透過提問與對話，孩子開始思考 AI 如何影響生活、人際與價值觀，","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/616/cover/4D9n9xrvQTMZuUtWreONEUWlZLkudzEFFVxEDvkf.png","tags":["教學資源","遊戲式教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/617","title":"【AI思辨】行動規劃學習單｜讓學生練習對AI表態，把想法轉化為行動","author":"玩轉學校 x LG","date":"2026-05-04","summary":"內容說明 設計理念 在 AI 逐漸融入日常生活的時代，孩子需要的不只是理解，更需要做出選擇與行動的能力。《樂金筆記本》由 LG 與 玩轉學校 共同合作開發，是一套以「議題式遊戲教學法」為核心的 AI 思辨課程，透過「體驗、認知、行動」三個層次，引導學生從思考走向實踐，學會在便利與判斷之間找到平衡。 系列課程第三部分「走吧！展開行動」，將前兩階段的思辨轉化為具體行動。孩子不再只是討論 AI，而是開始思考：在真實生活中，我可以如何使用 AI","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/617/cover/q54RxgpHhhgpylabJCJqUtm23cN6coUqKooJ1eUE.png","tags":["教學資源","遊戲式教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/452","title":"AI使用安全與隱私保護指南、學生自我檢核表（AI素養教材包）","author":"翻轉教育","date":"2024-10-27","summary":"內容說明 什麼是 AI 素養？ AI 素養（英文：AI Literacy, AIL）除了指認識 AI 的運作方式、培養有效使用的技巧外，掌握 AI 使用倫理與培養公民責任等也包含在內。AI 素養的概念早在 2019 年的《人工智慧北京共識》中就由全球的專家學者提出，2023年麻省理工學院也發起「世界 AI 日」提出 5 大 AI 素養，2024年，聯合國教科文組織（UNESCO）更提出《教師與中小學生 AI 素養架構》。 AI 工具就像","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/452/cover/vlG2YW8Y4FY4YgcGAz0i9Uqo0OymQDQAKhykYR26.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/441","title":"【2024教育創新國際年會】演講ppt整理包：自主翻轉365搖滾趴（AI×教學×班級經營×創作）","author":"2024教育年會講師群","date":"2024-10-03","summary":"內容說明 10 位講者輪番上陣，在6分鐘內傳授6小時都說不完的畢生功力 #自主翻轉365搖滾趴 金句連發 × 多元議題 × 交流互動 × 價值傳遞 用強者 6 分鐘，啟動自主翻轉，讓更好的教育來得更快！ 論壇回放影片：自主翻轉365搖滾趴 國中教師的工具箱 國中班級經營X高效教學資源專區 專為國中老師打造，有效解決教學現場大小事。 #親師溝通 #SEL #SDGs #教學設計 #國中會考 立即前往","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/441/cover/VsBpxVszj6LFHWQsqmt6oZM0WepT8vM6SdivsVyH.png","tags":["教學資源","教育趨勢"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/419","title":"教育趨勢報Vol 3：113學年4大新制介紹、親師溝通&新手老師班經工具包、「AI時代新教育」觀點","author":"翻轉教育","date":"2024-08-02","summary":"內容說明 資訊滿載的時代，讀一份「教育趨勢報」，為您補充教學能量！翻轉教育「教育趨勢報」第三期出刊，帶您回顧六七月國內外教育時事。電影《腦筋急轉彎2》備受討論，此期也整理與情緒教育相關的內容。 本期焦點話題是「AI時代新教育」。親子天下2024教育創新國際年會即將在9月25日舉辦，此次年會主題是「AI時代為自己而學」。當全世界都在問，AI無所不能，我們為什麼還要學習？又該教孩子什麼？學校、教育、老師的角色會有什麼轉變？本期趨勢報彙整多篇","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/419/cover/Sbg0q9jvfELPmkxMTLIoWundQXYMpLl8dTOPA9Go.png","tags":["教學資源","AI人工智慧"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/333","title":"用 AI 畫唐詩！3 大 AI 影像辨識應用比較大禮包","author":"施亦盈","date":"2023-11-23","summary":"內容說明 AI 影像辨識 3 大網站 近期愈來愈多老師們也開始嘗試使用 AI 數位工具繪圖（圖像生成），不需要複雜的 Prompt（咒語），簡單輸入文字需求就能讓生成出指定圖像；GPTs 的推出也讓生成圖變得更容易，不需要花時間設定前置咒語就能生成連環漫畫、各種插圖。此功能起源於許多 AI 工具釋出「AI 影像辨識」功能——也就是讓人工智慧辨識視覺資料；其中大家最常使用的 3 大 AI 影像辨識網站為： ChatGPT Google B","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/333/cover/QxnRcsmIxylapUtnY4mhbTXssVfMROV4FLBCzmlz.jpg","tags":["教學資源","資訊融入教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/287","title":"AI教育趨勢整理包：未來人才6大關鍵字、常見QA","author":"翻轉教育","date":"2023-07-22","summary":"內容說明 設計理念｜ AI人工智慧的出現，大幅地改變人類社會，2022年底，ChatGPT橫空出世，讓AI的影響全面普及化，身處現在的我們該如何調整自己的心態，並幫助下一代做好因應未來的準備？親子天下最新出版《AI如何重塑教育》一書，書中詳細闡述身為教師或家長的我們，應了解孩子要學什麼？才不會被AI取代；我們要教什麼？幫助孩子走進新時代；如何引導孩子？引動生命內在熱情。 使用說明｜ 這份趨勢整理包，以最淺白的方式，說明AI教育趨勢下的六","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/287/cover/A7L2DCemN7XpAts1yjcAkuXxlGKSS1XzFPipY2ry.png","tags":["教學資源","教育趨勢"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/253","title":"教師必知的 ChatGPT 中文咒語應用集","author":"李承翰","date":"2023-05-03","summary":"內容說明 設計理念｜查特（ChatGPT）的出現，不僅是帶來一陣風潮，也可能改變我們習以為常的學習模式。想一起嘗試用 AI 提升行政工作效率、輕鬆發揮更多教學創意嗎？翻轉教育邀請查特普拉斯共同創辦人李承翰教師必知的 ChatGPT 咒語（Prompt）模版範例，免費提供給所有翻轉教育教師，由前輩帶路，從使用基礎 AI 詠唱術進階到用高級詠唱術為教師工作加分。 使用說明｜本教學資源提供教育工作者 26 個可運用的 ChatGPT Prom","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/253/cover/XNX9g9X8grBheQBzAXwrKjaPdZrSoOQLwXjpiX4q.jpg","tags":["教學資源","自主學習"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/251","title":"Canva AI 教學手冊下載！輕鬆製作教學簡報、學習單","author":"劉恩淇","date":"2023-04-23","summary":"內容說明 設計理念｜ Canva 最新推出 Canva AI 功能以後，讓我們在製作簡報或各種設計文宣時能夠事半功倍！尤其，學校老師在製作教學簡報與學習單，可使用的效能與創意發揮空間更大，風格和主題更多變。這次特別整理 Canva AI 生成工具教學手冊，讓大家能一次清楚Canva AI 有哪些實用技巧，以及如何應用於課堂簡報、學習單。 使用說明｜ 這份 Canva AI 教學手冊針對老師與教育工作者做工具介紹及使用步驟說明，手冊內容包","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/251/cover/uehgsTsWLjcoTlKVcOr79zrkoeLlMAiNft45u3Gj.png","tags":["教學資源","資訊融入教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/236","title":"用ChatGPT 學思辨！PPT、學習單趣味教材下載","author":"翻轉教育","date":"2023-03-22","summary":"內容說明 設計理念｜ChatGPT為人類帶來了很多的可能性，而面對新興科技的不確定性，建議老師和學生在使用之前，都能先了解ChatGPT可能帶來的益處及隱憂。許多老師開始擔心，學生是否會使用ChatGPT完成報告及作業，老師或許可以先教導孩子認識ChatGPT，並帶領孩子思考科技工具應如何妥善運用，以及它可能為我們的生活及社會帶來什麼影響。 使用說明｜此份教學資源提供老師課堂可直接使用的課堂PPT、學習單、討論問題，透過趣味的活動，讓孩","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/236/cover/lEzqYdnndQtlwXGfI8iqwjWaECw23nam8Kd4SYUm.png","tags":["教學資源","教育趨勢"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/231","title":"如何帶孩子討論ChatGPT？30 個提問圖卡範本","author":"翻轉教育","date":"2023-03-17","summary":"內容說明 設計理念｜ 隨著資訊科技快速的進步與發展，人工智慧（AI）相關的產品紛紛問世。而近期ChatGPT的出現，不僅是帶來一陣風潮，也可能改變我們習以為常的學習模式。ChatGPT作為一個自然語言處理模型，可以幫助我們更快速地解決問題、尋找答案，甚至可以自主學習、拓展自己的知識。 然而，儘管ChatGPT的如此便利，它也對於教育界帶來許多挑戰，面對新興科技，我們的孩子是否具備足夠的資訊素養與認知，是他能否妥善利用新科技的關鍵。 使用","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/231/cover/lLofsfUZTHCkrSJIUnfXwZXDbK5czRbJJVo73jJC.png","tags":["教學資源","教育趨勢"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/550","title":"Canva AI X 互動式遊戲王卡活動：教材範本+應用詳解","author":"謝汯恩","date":"2025-08-27","summary":"內容說明 隨著人工智慧技術的快速發展，Canva AI 在教育應用中展現出強大的輔助功能。它不僅能加速教材設計流程、提升素材處理效率，更能協助老師依需求快速生成互動式內容與網站。透過 Canva AI，教師可建立符合課堂需求的應用，例如點名系統、作業繳交紀錄、期末評語生成等，並能依照指令彈性調整，讓教學與行政工作更有效率。此教案將示範如何運用 Canva AI 設計「互動式遊戲王活動」，提供老師們創新且便利的數位教學應用方式。 使用說明","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/550/cover/tOrZ3Bpo2X7uDwVP20N5lFzVRaaP4NpRDFGUCjEI.png","tags":["教學資源","班級經營"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/522","title":"期末／綜合活動適用！AI協作課堂X生涯探索：「我的少年夢」漫畫模板應用","author":"李衿綺","date":"2025-05-30","summary":"內容說明 設計理念｜ 「你的夢想是什麼？」這學生常被問到的問題。「用漫畫，寫給未來的自己」便是結合六年級下學期的國語課文〈我的少年夢〉的教學設計。透過兩階段的漫畫活動，引導學生從閱讀理解出發，進一步走向自我描繪與未來想像。 這份《我的少年夢》的 AI 漫畫課程與教材，是專為國小六年級學生設計，特別適用於升國中前、期末或綜合活動課。課程以語文課文〈我的少年夢〉為起點，透過兩階段活動，帶領學生從閱讀理解邁向自我探索與未來想像： 第一階段：漫","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/522/cover/v3kgtxPZ8sXr2tCvuRnzA2cJd6Phn8E2RxRJkClw.png","tags":["教學資源","期末資源"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/510","title":"班親會／親師座談必備！AI時代生涯探索與核心素養（簡報範本）","author":"翻轉教育","date":"2025-05-04","summary":"內容說明 當孩子說「我不知道未來要做什麼」，家長該怎麼辦？ 面對孩子未來的方向，許多家長常感到焦慮卻無力協助。 「讀書跟未來工作有什麼關係？」「這樣的個性適合什麼職業？」當孩子面對這些問題卻找不到答案時，往往會出現逃避、低落，甚至對未來失去想像。 而家長可能也常有一種矛盾： 一方面希望孩子幸福快樂，一方面又擔心他們走不穩、想得不清楚。 事實上，孩子真正需要的，從來不是立刻做出決定，而是有機會好好探索自己、理解世界、慢慢走向可能的方向。而","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/510/cover/WyDHbXLBULaWokdIgO8gQIKinE13P44yczovJ0vA.png","tags":["教學資源","生涯探索"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/395","title":"臺灣台語趣味教材：AI與數位主題、數位新詞圖卡","author":"陳雯琪","date":"2024-06-11","summary":"內容說明 設計理念｜AI風潮席捲全球，尤其以唯妙唯肖、近可亂真的AI圖片生成技術廣受大眾歡迎，它將天馬行空的想像形象化，彌補不擅長繪畫者的缺憾。然而多數的繪圖軟體或網站雖有中文介面，卻無法辨識臺灣台語。透過本教學活動設計，學生由文生圖，再以圖生文。繪圖過程中學生可嘗試不同的語別轉換，以及語詞的抽換，比較不同的生成結果，並經由教師的引導聚焦於臺灣台語的學習。 使用說明｜這份資源提供課程活動與數位新詞圖卡，讓老師自由運用，在班上可使用can","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/395/cover/J2XLij5eyffPxAJJdtY8E8WZFRP4OrjLVCfOcYAn.png","tags":["教學資源","閩南語"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/427","title":"AI時代的教育：參考資料（原文）","author":"親子天下","date":"2024-09-02","summary":"內容說明 內容說明 近年來AI不斷在各領域嶄露頭角，AI技術的驚人進步正在改變我們生活，意味著下一代孩子將面臨與我們成長時截然不同的世界。「如果工作部分或全面自動化，教育哪些部分還具有意義呢？」如何讓每個孩子不僅能夠跟上時代步伐，還能站穩自己的價值？ 「課程重新設計中心」（Center for Curriculum Redesign）專家及其創辦人查爾斯‧費德在著作《AI時代的教育》中，根據世界各地超過100種架構與861份學習科學論文","image":"https://flipedu-cdn.parenting.com.tw/teachingMaterials/427/cover/ne81U32Dhutz79BeyM0FGbypz9nXEP9QAovUoBnO.jpg","tags":["教學資源","資訊融入教學"],"cat1":[],"cat2":[],"cat3":[],"cat4":[],"type":"article","featured":false,"resource":true},{"url":"https://flipedu.parenting.com.tw/teacher_resource/399","title":"Notion 教學應用手冊：教育版申請&分類與共編功能操作分享","author":"方方老師","date":"2024-06-24","summary":"內容說明 內容說明｜想整理自己的教學設計與素材嗎？腦中突然閃過課程靈感，很想   if(a.resource||a.type==='resource') return {ratio11:true, btn:'立即下載', icon:SVG_DL, badge:''};
  if(a.type==='course') return {ratio11:false, btn:'前往課程', icon:SVG_ARROW, badge:'course', badgeTxt:'課程'};
  if(a.type==='event')  return {ratio11:false, btn:'查看活動', icon:SVG_ARROW, badge:'event', badgeTxt:'活動'};
  return {ratio11:false, btn:'閱讀全文', icon:SVG_LINK, badge:''}; // article（預設）
}

/* ---------- 建立四維度篩選列 ---------- */
// 關鍵字列：吃 tags 欄、可複選；不選任何關鍵字＝不篩選（無「全部」鈕，較輕量）
function buildKeywordRow(){
  const set=new Set();
  DATA.forEach(a=>(a.tags||[]).forEach(v=>{if(v)set.add(v);}));
  const cont=document.getElementById('keywordRow');
  const bar=document.querySelector('.theme-bar');
  cont.innerHTML='';
  if(!set.size){if(bar)bar.style.display='none';return;}
  if(bar)bar.style.display='flex';
  const pin=(PIN.keyword||[]).filter(v=>set.has(v));
  const rest=[...set].filter(v=>!(PIN.keyword||[]).includes(v)).sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  [...pin,...rest].forEach(v=>{
    const b=document.createElement('button');
    b.className='theme-chip'+(active.keyword.has(v)?' active':'');
    b.textContent=v;
    b.onclick=()=>{
      if(active.keyword.has(v)){active.keyword.delete(v);b.classList.remove('active');}
      else{active.keyword.add(v);b.classList.add('active');}
      page=1;renderCards();
    };
    cont.appendChild(b);
  });
}

function buildFilters(){
  const map={cat2:'rowCat2',cat1:'rowCat1',cat3:'rowCat3',cat4:'rowCat4'};
  Object.keys(map).forEach(key=>{
    const set=new Set();
    DATA.forEach(a=>(a[key]||[]).forEach(v=>{if(v)set.add(v);}));
    const cont=document.getElementById(map[key]);
    cont.innerHTML='';
    const allBtn=mkAllChip(key,cont);
    cont.appendChild(allBtn);
    const pin=(PIN[key]||[]);
    const rest=[...set].filter(v=>!pin.includes(v)).sort((a,b)=>a.localeCompare(b,'zh-Hant'));
    [...pin,...rest].forEach(v=>cont.appendChild(mkValChip(v,key,cont,allBtn)));
  });
}
// 「全部」= 該維度不篩選（清空該維度的選取）
function mkAllChip(key,cont){
  const b=document.createElement('button');
  b.className='chip'+(active[key].size===0?' active':'');
  b.textContent='不限';
  b.onclick=()=>{
    active[key].clear();
    cont.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    page=1;renderCards();
  };
  return b;
}
// 各維度可同時複選；同維度為 OR、跨維度為 AND
function mkValChip(val,key,cont,allBtn){
  const b=document.createElement('button');
  b.className='chip'+(active[key].has(val)?' active':'');
  b.textContent=val;b.dataset.val=val;
  b.onclick=()=>{
    if(active[key].has(val)){active[key].delete(val);b.classList.remove('active');}
    else{active[key].add(val);b.classList.add('active');}
    allBtn.classList.toggle('active',active[key].size===0);
    page=1;renderCards();
  };
  return b;
}

/* ---------- Hero 輪播 ---------- */
function buildHero(feat){
  const sl=document.getElementById('heroSlides'),dt=document.getElementById('heroDots');
  const hero=document.getElementById('hero');
  sl.innerHTML='';dt.innerHTML='';
  if(!feat.length){if(hero)hero.style.display='none';return;}
  if(hero)hero.style.display='block';
  feat.forEach((a,i)=>{
    const s=document.createElement('div');
    s.className='hero-slide'+(i===0?' active':'');
    const hi=!!a.image;
    const imgH=hi?'<img src="'+a.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'';
    const phS=hi?'display:none':'';
    const cats=[...(a.cat2||[]),...(a.cat1||[])].slice(0,3);
    const catsH=cats.map(t=>'<span class="hero-cat">'+t+'</span>').join('');
    const beh=typeBehavior(a);
    s.innerHTML=(
      '<div class="hero-img">'+imgH
      +'<div class="hero-img-ph" style="'+phS+'">'+PH_EMOJI[i%6]+'</div>'
      +'<span class="hero-badge">'+SVG_STAR+'編輯精選</span>'
      +'</div>'
      +'<div class="hero-body">'
      +(catsH?'<div class="hero-cats">'+catsH+'</div>':'')
      +'<div class="hero-ttl">'+a.title+'</div>'
      +'<div class="hero-foot">'
      +'<div class="hero-author"><div class="hero-avatar"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg></div>'
      +'<span>'+(a.author||'\u2014')+'</span></div>'
      +'<a href="'+a.url+'" target="_blank" rel="noopener noreferrer" class="hero-readbtn">'+beh.btn+' '+beh.icon+'</a>'
      +'</div></div>'
    );
    sl.appendChild(s);
    const d=document.createElement('button');
    d.className='hero-dot'+(i===0?' active':'');
    d.setAttribute('aria-label','第 '+(i+1)+' 則');
    d.onclick=()=>{goHero(i);startTimer();};
    dt.appendChild(d);
  });
  heroIdx=0;
}
function goHero(i){
  const n=document.querySelectorAll('.hero-slide').length;if(!n)return;
  heroIdx=((i%n)+n)%n;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===heroIdx));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===heroIdx));
}
function startTimer(){
  if(heroTimer)clearInterval(heroTimer);
  if(document.querySelectorAll('.hero-slide').length>1)heroTimer=setInterval(()=>goHero(heroIdx+1),7000);
}
document.getElementById('heroPrev').onclick=()=>{goHero(heroIdx-1);startTimer();};
document.getElementById('heroNext').onclick=()=>{goHero(heroIdx+1);startTimer();};

/* ---------- 篩選邏輯（搜尋 + 四維度交叉過濾）---------- */
/* 同維度多選 → OR；該維度未選任何值 → 不篩選 */
function matchDim(itemVals,set){
  if(set.size===0)return true;
  return (itemVals||[]).some(v=>set.has(v));
}
function filtered(){
  const q=searchQ.trim().toLowerCase();
  return DATA.filter(a=>{
    if(q){
      const hay=[a.title,a.author,a.summary,(a.tags||[]).join(' '),
        (a.cat1||[]).join(' '),(a.cat2||[]).join(' '),
        (a.cat3||[]).join(' '),(a.cat4||[]).join(' ')].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    if(!matchDim(a.cat1,active.cat1))return false;
    if(!matchDim(a.cat2,active.cat2))return false;
    if(!matchDim(a.cat3,active.cat3))return false;
    if(!matchDim(a.cat4,active.cat4))return false;
    if(!matchDim(a.tags,active.keyword))return false;
    return true;
  });
}
function hasActiveFilter(){
  return !!(searchQ.trim()||active.cat1.size||active.cat2.size||active.cat3.size||active.cat4.size||active.keyword.size);
}

/* ---------- 渲染卡片 ---------- */
function renderCards(){
  const list=filtered(),total=list.length,tp=Math.ceil(total/PER_PAGE)||1;
  if(page>tp)page=tp;
  // 結果列
  document.getElementById('resultCount').innerHTML='共 <b>'+total+'</b> 篇';
  document.getElementById('clearBtn').classList.toggle('show',!!hasActiveFilter());
  const grid=document.getElementById('grid');grid.innerHTML='';
  const slice=list.slice((page-1)*PER_PAGE,page*PER_PAGE);
  if(!slice.length){
    grid.innerHTML='<div class="empty"><div class="empty-emoji">\uD83D\uDD0D</div><p>找不到符合的內容。<br>換個關鍵字，或清除篩選條件再試試。</p><button onclick="clearAll()">清除全部篩選</button></div>';
    renderPag(total);return;
  }
  slice.forEach((a,i)=>{
    const beh=typeBehavior(a);
    const card=document.createElement('a');
    card.className='card';
    card.href=a.url;card.target='_blank';card.rel='noopener noreferrer';
    const hi=!!a.image;
    const imgH=hi?'<img src="'+a.image+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'';
    const phS=hi?'display:none':'';
    // 圖上標籤：優先顯示工具(cat1)，再補情境(cat2)，最多 2 個
    const otags=[...(a.cat1||[]),...(a.cat2||[])].slice(0,2);
    const tagsH=otags.map(t=>'<span class="card-otag">'+t+'</span>').join('');
    // 角標：精選 + 課程/活動
    let cornerH='';
    if(a.featured)cornerH+='<span class="badge-feat">'+SVG_STAR+'精選</span>';
    if(beh.badge)cornerH+='<span class="badge-type '+beh.badge+'">'+beh.badgeTxt+'</span>';
    card.innerHTML=(
      '<div class="card-imgwrap'+(beh.ratio11?' ratio11':'')+'">'
      +imgH
      +'<div class="card-ph" style="'+phS+'">'+PH_EMOJI[i%6]+'</div>'
      +'<div class="card-overlay-tags">'+tagsH+'</div>'
      +'<div class="card-corner">'+cornerH+'</div>'
      +'</div>'
      +'<div class="card-body">'
      +'<div class="card-ttl">'+a.title+'</div>'
      +'<div class="card-summary">'+a.summary+'</div>'
      +'</div>'
      +'<div class="card-foot">'
      +'<div class="card-meta">'
      +'<span class="card-author">'+SVG_USER+(a.author||'\u2014')+'</span>'
      +'<span class="card-date">'+(a.date||'')+'</span>'
      +'</div>'
      +'<span class="card-readlink">'+beh.btn+' '+beh.icon+'</span>'
      +'</div>'
    );
    grid.appendChild(card);
  });
  renderPag(total);
}

/* ---------- 分頁 ---------- */
function renderPag(total){
  const pg=document.getElementById('pagination');pg.innerHTML='';
  const tp=Math.ceil(total/PER_PAGE);if(tp<=1)return;
  const mk=(txt,p,dis,act)=>{
    const b=document.createElement('button');
    b.className='page-btn'+(act?' active':'');
    b.innerHTML=txt;b.disabled=dis||act;
    if(!dis&&!act)b.onclick=()=>{page=p;renderCards();window.scrollTo({top:0,behavior:'smooth'});};
    return b;
  };
  const dots=()=>{const s=document.createElement('span');s.className='page-dots';s.textContent='…';return s;};
  pg.appendChild(mk('&lsaquo;',page-1,page===1,false));
  const show=new Set([1,2,tp-1,tp,page-1,page,page+1].filter(p=>p>=1&&p<=tp));
  let last=0;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(p>last+1)pg.appendChild(dots());
    pg.appendChild(mk(p,p,false,p===page));
    last=p;
  });
  pg.appendChild(mk('&rsaquo;',page+1,page===tp,false));
}

/* ---------- 清除全部篩選 ---------- */
function clearAll(){
  searchQ='';document.getElementById('searchInput').value='';
  active.cat1.clear();active.cat2.clear();active.cat3.clear();active.cat4.clear();active.keyword.clear();
  page=1;buildKeywordRow();buildFilters();renderCards();
}

/* ---------- 解析 Apps Script 回傳的列 → 統一資料結構 ---------- */
function parseRows(rows){
  const seen=new Set();
  return rows.map(r=>{
    const title=String(r['article_title--h1']||'').trim();
    if(!title||seen.has(title))return null;seen.add(title);
    const fv=String(r['featured']||'').toLowerCase();
    const featured=(r['featured']===true||['true','精選','yes','1'].includes(fv));
    const rv=String(r['resource']||'').toLowerCase();
    const resource=(r['resource']===true||['true','yes','1'].includes(rv));
    const type=String(r['type']||'article').trim().toLowerCase();
    return {
      url:String(r['url']||r['網址']||'#'),
      title,
      author:String(r['article_author']||r['作者']||''),
      date:(()=>{
        const raw=String(r['publish_time']||'');if(!raw)return'';
        const d=new Date(raw);
        if(!isNaN(d)){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
        return raw.substring(0,10);
      })(),
      summary:String(r['article_introduction']||'').trim().replace(/\s+/g,' ').substring(0,220),
      image:String(r['article_photo src']||r['article_photo_src']||''),
      tags:splitMulti(r['tags']),
      cat1:splitMulti(r['cat1_tool']),
      cat2:splitMulti(r['cat2_situation']),
      cat3:splitMulti(r['cat3_level']),
      cat4:splitMulti(r['cat4_subject']),
      type,featured,resource
    };
  }).filter(Boolean);
}

/* ---------- 載入流程：DEMO → 快取 → 背景抓 GAS ---------- */
function paint(){
  buildKeywordRow();
  buildFilters();
  const feat=DATA.filter(a=>a.featured);
  buildHero((feat.length?feat:DATA.slice(0,3)).slice(0,8));
  startTimer();
  renderCards();
}
async function loadData(){
  const CACHE_KEY='ai_edu_cache_v1';

  // 讀上一次成功的快取（不論新舊）
  let cached=null;
  try{const c=localStorage.getItem(CACHE_KEY);if(c){const o=JSON.parse(c);if(Array.isArray(o.data)&&o.data.length)cached=o;}}catch(e){}

  // ① 先顯示：有快取就用快取，否則用內嵌預載（瞬間可見）
  DATA=cached?cached.data:DEMO;
  paint();

  // ② 背景抓 Apps Script（網址尚未設定就跳過）
  if(!/^https:\/\/script\.google\.com/.test(APPS_SCRIPT_URL)){
    console.info('[資料] 尚未設定 APPS_SCRIPT_URL，目前顯示'+(cached?'快取':'內嵌預載')+'資料。');return;
  }
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    if(!Array.isArray(rows)||!rows.length)throw new Error('回傳空白（分頁名稱或資料是否正確？）');
    const parsed=parseRows(rows);
    if(!parsed.length)throw new Error('無有效資料列');
    DATA=parsed;
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:DATA}));}catch(e){}
    paint();
    console.info('[資料] 已更新為 Apps Script 線上資料，共 '+parsed.length+' 筆。');
  }catch(e){
    // 抓失敗：沿用目前畫面（快取或預載），不倒退
    console.warn('[資料] Apps Script 連線失敗，沿用'+(cached?'最後一次快取':'內嵌預載')+'資料：',e.message);
  }
}

/* ---------- 事件 ---------- */
let searchT=null;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(searchT);
  searchT=setTimeout(()=>{searchQ=e.target.value;page=1;renderCards();},120);
});
document.getElementById('clearBtn').addEventListener('click',clearAll);

   第二階段預留（現在不啟用）：依 cat2_situation 把頁面切成數個區塊

   }
   =================================================================== */

loadData();
